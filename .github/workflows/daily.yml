name: Publish Lunch Menus

on:
  workflow_dispatch:

  schedule:
    # Runs Monday-Friday at 08:00 UTC.
    # In Vienna this is 10:00 during summer time and 09:00 during winter time.
    - cron: "0 8 * * 1-5"

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
      CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
      CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
      CONFLUENCE_PAGE_ID: ${{ secrets.CONFLUENCE_PAGE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Debug Wrenkh connectivity
        run: |
          echo "Testing normal curl..."
          curl -Iv --connect-timeout 20 https://wrenkh-wien.at/site/de/restaurant/mittagsmenue || true

          echo "Testing IPv4 curl..."
          curl -4 -Iv --connect-timeout 20 https://wrenkh-wien.at/site/de/restaurant/mittagsmenue || true

          echo "Testing IPv6 curl..."
          curl -6 -Iv --connect-timeout 20 https://wrenkh-wien.at/site/de/restaurant/mittagsmenue || true    

      - name: Publish to Confluence
        run: |
          python -m src.publish